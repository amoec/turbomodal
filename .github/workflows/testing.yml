name: Testing Build

# Triggered by tags of the form v*.devN (e.g. v0.2.4.7.dev0).

on:
  push:
    tags: ["v*.dev*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or commit to build from"
        default: "testing"
        required: false

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Disable Windows AV from interfering with build
        if: runner.os == 'Windows'
        run: Set-MpPreference -DisableRealtimeMonitoring $true
        shell: powershell

      - uses: pypa/cibuildwheel@v3.3.1

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          retention-days: 14

  # Optional: collect all wheels into a single draft pre-release so you can
  # download them from the Releases page rather than hunting through the
  # Actions artifact UI.  The release is marked as a pre-release so it never
  # appears as the "latest" release.
  draft-prerelease:
    needs: build-wheels
    runs-on: ubuntu-latest
    # Only run when triggered by a tag push (not workflow_dispatch)
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          prerelease: true
          draft: false
          name: "${{ github.ref_name }} (testing build)"
          body: |
            **Testing/dev build — not for production use.**

            Tag: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`

            Download the `.whl` for your platform and Python version and install with:
            ```
            pip install turbomodal-*.whl --force-reinstall
            ```
