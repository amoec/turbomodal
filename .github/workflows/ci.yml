name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglu1-mesa libsuitesparse-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp suite-sparse

      - name: Install SuiteSparse (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install suitesparse:x64-windows

      - name: Block Windows AV from interfering with tests
        if: runner.os == 'Windows'
        run: Set-MpPreference -DisableRealtimeMonitoring $true
        shell: powershell

      - name: Install build dependencies
        run: pip install scikit-build-core pybind11

      - name: Install package with ML extras (Windows)
        if: runner.os == 'Windows'
        run: pip install -e ".[ml,dev]"
        env:
          CMAKE_TOOLCHAIN_FILE: C:/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Install package with ML extras
        if: runner.os != 'Windows'
        run: pip install -e ".[ml,dev]"

      - name: Run Python tests
        run: pytest python/tests/ -v --tb=short
        env:
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"

  cpp-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        cholmod: [OFF]
        include:
          - os: ubuntu-latest
            cholmod: ON
          - os: macos-latest
            cholmod: ON
          - os: windows-latest
            cholmod: ON

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install SuiteSparse (Linux)
        if: runner.os == 'Linux' && matrix.cholmod == 'ON'
        run: sudo apt-get update && sudo apt-get install -y libsuitesparse-dev

      - name: Install SuiteSparse (macOS)
        if: runner.os == 'macOS' && matrix.cholmod == 'ON'
        run: brew install suite-sparse

      - name: Install SuiteSparse (Windows)
        if: runner.os == 'Windows' && matrix.cholmod == 'ON'
        run: vcpkg install suitesparse:x64-windows

      - name: Block Windows AV from interfering with tests
        if: runner.os == 'Windows'
        run: Set-MpPreference -DisableRealtimeMonitoring $true
        shell: powershell

      - name: Configure CMake (Windows with CHOLMOD)
        if: runner.os == 'Windows' && matrix.cholmod == 'ON'
        run: cmake -B build -DBUILD_TESTS=ON -DBUILD_PYTHON=OFF -DUSE_OPENMP=OFF -DUSE_CHOLMOD=ON -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Configure CMake
        if: "!(runner.os == 'Windows' && matrix.cholmod == 'ON')"
        run: cmake -B build -DBUILD_TESTS=ON -DBUILD_PYTHON=OFF -DUSE_OPENMP=OFF -DUSE_CHOLMOD=${{ matrix.cholmod }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release
